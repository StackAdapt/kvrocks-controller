---
# Usage: ansible-playbook -i ../ansible-load-nodes.ini copy-reader.yml
# Or from parent directory: ansible-playbook -i ansible-load-nodes.ini playbooks/copy-reader.yml
- name: Copy writer binary to load nodes
  hosts: load_nodes
  become: true
  tasks:
    - name: Copy writer service to remote hosts
      ansible.builtin.copy:
        src: /Users/byron.seto/Documents/workspace/third_party/kvrocks-controller/cmd/writer/writer.service
        dest: /etc/systemd/system/writer.service
        mode: "0644"
        owner: root
        group: root

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: yes
