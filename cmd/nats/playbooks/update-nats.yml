---
# Usage: ansible-playbook -i ../ansible-load-nodes.ini update-nats.yml
- name: Update NATS server binary
  hosts: load_nodes
  become: true
  serial: 1
  tasks:
    - name: Download NATS server tarball
      ansible.builtin.get_url:
        url: https://github.com/nats-io/nats-server/releases/download/v2.11.11/nats-server-v2.11.11-linux-arm64.tar.gz
        dest: /home/ec2-user/nats-server-v2.11.11-linux-arm64.tar.gz
        mode: "0644"
        owner: ec2-user
        group: ec2-user

    - name: Extract NATS server tarball
      ansible.builtin.unarchive:
        src: /home/ec2-user/nats-server-v2.11.11-linux-arm64.tar.gz
        dest: /home/ec2-user/
        remote_src: yes
        owner: ec2-user
        group: ec2-user

    - name: Stop NATS service
      ansible.builtin.systemd:
        name: nats
        state: stopped

    - name: Copy nats-server binary to /usr/bin
      ansible.builtin.copy:
        src: /home/ec2-user/nats-server-v2.11.11-linux-arm64/nats-server
        dest: /usr/bin/nats-server
        remote_src: yes
        mode: "0755"
        owner: root
        group: root

    - name: Start NATS service
      ansible.builtin.systemd:
        name: nats
        state: started

    - name: Wait 30 seconds after copying binary
      ansible.builtin.pause:
        seconds: 30
